name: ESPHome Components CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Quick checks ────────────────────────────────────────────────────────────

  lint:
    name: Python Lint (ruff + flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install ruff==0.15.12 flake8

      # ruff catches what flake8 misses (pyflakes-class checks, unused imports,
      # some bugbear patterns). Config in .ruff.toml. ESPHome core uses ruff too.
      - name: Run ruff
        run: ruff check components/

      - name: Run flake8
        run: flake8 components/

  format-check:
    name: C++ Format Check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install clang-format
        # Pinned to ESPHome's official version so CI == local hook == upstream.
        run: pip install clang-format==13.0.1

      - name: Run clang-format check
        run: |
          find components/ \( -name '*.cpp' -o -name '*.h' \) -print0 | \
            xargs -0 clang-format --dry-run --Werror

  cppcheck:
    name: C++ Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    # Substitutes for clang-tidy, which cannot target xtensa (ESP32-S3) with stock
    # LLVM. cppcheck tolerates missing headers / unknown flags, so it runs without a
    # compile DB. Conservative check set (no noisy "style"/"information"); extend
    # .cppcheck-suppressions for false positives rather than widening the set.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --version
          cppcheck \
            --enable=warning,performance,portability \
            --std=c++20 \
            --platform=unix32 \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --error-exitcode=1 \
            --quiet \
            components/

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run component contract tests
        run: python -m unittest discover -s tests -p 'test_*.py'

  config-validate:
    name: YAML Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ESPHome
        run: pip install esphome==2026.5.3

      - name: Generate dummy secrets
        run: |
          printf '%s\n' \
            'wifi_ssid: "ci-dummy"' \
            'wifi_password: "ci-dummy-password"' \
            'api_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="' \
            'ota_password: "ci-dummy-ota"' \
            'fallback_password: "ci-dummy-fallback"' \
            > devices/generic/secrets.yaml

      - name: Validate component fixtures
        run: |
          for yaml in \
            devices/generic/wled_bridge_*.yaml \
            devices/generic/custom_components_smoke.yaml \
            devices/generic/amg8833_poc.yaml \
            devices/generic/mcu90640_poc.yaml \
            devices/generic/jiecang_desk_test.yaml \
            devices/generic/ys-irtm-demo.yaml; do
            python -c "
          import re, sys, os
          p = sys.argv[1]
          rel = os.path.relpath('components', os.path.dirname(p))
          t = open(p).read()
          t = re.sub(r'source:\s*github://patrick3399/esphome_components',
                     'source:\n      type: local\n      path: ' + rel.replace(os.sep, '/'), t)
          open(p, 'w').write(t)
          " "$yaml"
            echo "--- Validating $yaml ---"
            esphome config "$yaml" > /dev/null
          done
          for yaml in \
            tests/test-esp32s3-idf.yaml \
            tests/test-esp32s3-esp-sr.yaml \
            tests/test-i2s-audio.yaml \
            devices/generic/nrf52_generic.yaml; do
            echo "--- Validating $yaml ---"
            esphome config "$yaml" > /dev/null
          done
          echo "All test YAMLs passed config validation."

  # compile-smoke intentionally omitted: firmware builds are verified locally
  # via dev-compile.ps1 + record-verification.ps1 before every push. Running a
  # full ESP-IDF toolchain download on every CI push (~3-5 min, heavy on
  # Actions minutes) duplicates the local verification gate without adding
  # coverage that the other jobs don't already provide.
