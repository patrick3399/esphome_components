name: ESPHome Components CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Quick checks ────────────────────────────────────────────────────────────

  lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 components/

  format-check:
    name: C++ Format Check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install clang-format
        # Pinned to ESPHome's official version so CI == local hook == upstream.
        run: pip install clang-format==13.0.1

      - name: Run clang-format check
        run: |
          find components/ \( -name '*.cpp' -o -name '*.h' \) -print0 | \
            xargs -0 clang-format --dry-run --Werror

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run WLED bridge contract tests
        run: python -m unittest discover -s tests -p 'test_*.py'

  config-validate:
    name: YAML Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ESPHome
        run: pip install esphome

      - name: Generate dummy secrets
        run: |
          printf '%s\n' \
            'wifi_ssid: "ci-dummy"' \
            'wifi_password: "ci-dummy-password"' \
            'api_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="' \
            'ota_password: "ci-dummy-ota"' \
            > devices/generic/secrets.yaml

      - name: Validate all test YAMLs
        run: |
          for yaml in devices/generic/wled_bridge_*.yaml; do
            python -c "
          import re, sys, os
          p = sys.argv[1]
          rel = os.path.relpath('components', os.path.dirname(p))
          t = open(p).read()
          t = re.sub(r'source:\s*github://patrick3399/esphome_components',
                     'source:\n      type: local\n      path: ' + rel.replace(os.sep, '/'), t)
          open(p, 'w').write(t)
          " "$yaml"
            echo "--- Validating $yaml ---"
            esphome config "$yaml" > /dev/null
          done
          echo "All test YAMLs passed config validation."

  # CI intentionally avoids firmware builds.
  # Device YAMLs and firmware builds are verified locally while rewrites are in progress.
