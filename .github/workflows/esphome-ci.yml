name: ESPHome Components CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Quick checks ────────────────────────────────────────────────────────────

  lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 components/

  format-check:
    name: C++ Format Check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format

      - name: Run clang-format check
        run: |
          find components/ -name '*.cpp' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run WLED bridge contract tests
        run: python -m unittest discover -s tests -p 'test_*.py'

  config-validate:
    name: YAML Config Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        yaml:
          - devices/test/wled_bridge_poc.yaml
          - devices/test/wled_bridge_multibus_poc.yaml
          - devices/test/wled_bridge_matrix_poc.yaml
          - devices/test/wled_bridge_esp32_4mb.yaml
          - devices/test/wled_bridge_realtime_poc.yaml
          - devices/test/wled_bridge_audio_poc.yaml
          - devices/test/wled_bridge_entities_poc.yaml
          - devices/test/wled_bridge_full_poc.yaml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ESPHome
        run: pip install esphome

      - name: Generate dummy secrets
        run: |
          printf '%s\n' \
            'wifi_ssid: "ci-dummy"' \
            'wifi_password: "ci-dummy-password"' \
            'api_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="' \
            'ota_password: "ci-dummy-ota"' \
            > devices/test/secrets.yaml

      - name: Rewrite external_components to local
        run: |
          python -c "
          import re, sys, os
          yaml_path = sys.argv[1]
          rel = os.path.relpath('components', os.path.dirname(yaml_path))
          text = open(yaml_path).read()
          text = re.sub(
              r'source:\s*github://patrick3399/esphome_components',
              'source:\\n      type: local\\n      path: ' + rel.replace(os.sep, '/'),
              text,
          )
          open(yaml_path, 'w').write(text)
          " ${{ matrix.yaml }}

      - name: Validate config
        run: esphome config ${{ matrix.yaml }}

  # CI intentionally avoids firmware builds.
  # Device YAMLs and firmware builds are verified locally while rewrites are in progress.
