# =============================================================================
# CANONICAL DEVICE TEMPLATE  —  copy this file, then adapt. Do NOT use packages.
#
# Baseline: ESP32-S3 + octal PSRAM + WiFi + ESP-IDF.
#
# When adapting, delete COUPLED pairs together or config validation fails:
#
#   NO PSRAM  -> delete the `psram:` block  AND  the `psram:` (Free PSRAM)
#               sensor under `debug:`. The debug psram sensor requires the
#               psram component (cv.requires_component).
#
#   NO WiFi   -> delete the `wifi:` block  AND  `wifi_signal` sensor  AND  the
#   (Ethernet)  `wifi_signal_db` copy (%) sensor  AND  the `wifi_info`
#               text_sensor. Then add an `ethernet:` block instead.
#
#   NON-S3    -> `internal_temperature` is ESP32-family only; `cpu_frequency`
#               debug sensor is fine. Adjust `board:` / `variant:` / flash_size.
#
# Lines that must be deleted alongside a block above are tagged inline with
# `# <coupled: ...>`.
# =============================================================================
substitutions:
  devicename: "common-demo"
  upper_devicename: "Common Demo"
  comment: ""

external_components:
  - source: github://patrick3399/esphome_components

esphome:
  name: ${devicename}
  friendly_name: ${upper_devicename}
  comment: $comment

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended

psram:                              # <coupled: Free PSRAM debug sensor below>
  mode: octal
  speed: 80MHz

logger:
  baud_rate: 0
  level: DEBUG

wifi:                               # <coupled: wifi_signal / wifi_signal % / wifi_info below>
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT
  reboot_timeout: 4h

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0s
ota:
  - platform: esphome
    password: !secret ota_password

debug:
  update_interval: 10s

time:
  - platform: homeassistant
    id: homeassistant_time

button:
  - platform: restart
    name: "Restart"
    entity_category: "diagnostic"

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
      entity_category: "diagnostic"
    reset_reason:
      name: "Reset Reason"
      entity_category: "diagnostic"
  - platform: version
    name: "ESPHome Version"
    entity_category: "diagnostic"
  - platform: wifi_info             # <coupled: wifi block>
    ip_address:
      name: Device IP Address
      entity_category: "diagnostic"
    ssid:
      name: Device Connected SSID
      entity_category: "diagnostic"

binary_sensor:
  - platform: status
    name: "Status"
    entity_category: "diagnostic"

sensor:
  - platform: internal_temperature
    name: "Internal Temperature"
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: wifi_signal           # <coupled: wifi block>
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: copy                  # <coupled: wifi block — needs wifi_signal_db>
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""
  - platform: uptime
    type: seconds
    name: "Uptime"
    entity_category: "diagnostic"
  - platform: debug
    free:
      name: "Heap Free"
      entity_category: "diagnostic"
    block:
      name: "Heap Max Block"
      entity_category: "diagnostic"
    min_free:
      name: "Heap Min Free"
      entity_category: "diagnostic"
    fragmentation:
      name: "Heap Fragmentation"
      entity_category: "diagnostic"
    loop_time:
      name: "Loop Time"
      entity_category: "diagnostic"
    psram:                          # <coupled: psram block — requires psram component>
      name: "Free PSRAM"
      entity_category: "diagnostic"
    cpu_frequency:
      name: "CPU Frequency"
      entity_category: "diagnostic"