# ─── Waveshare ESP32-S3-GEEK ─────────────────────────────────────────────────
# 1.14" ST7789 LCD (240×135), USB-A male plug, 16MB flash, 2MB on-chip PSRAM
# No external peripherals assumed; displays on-chip system health metrics.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  devicename: "ws-s3-geek"
  upper_devicename: "WS S3 Geek"

esphome:
  name: $devicename
  friendly_name: $upper_devicename

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf

packages:
  common: !include ../../packages/common.yaml

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 6h

# ─── Sensors ─────────────────────────────────────────────────────────────────
sensor:
  - platform: internal_temperature
    id: chip_temp
    name: "Chip Temperature"
    update_interval: 10s

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 30s

  - platform: uptime
    id: uptime_sensor
    name: "Uptime"
    update_interval: 10s

  - platform: template
    id: free_heap_kb
    name: "Free Heap"
    unit_of_measurement: "KB"
    icon: "mdi:memory"
    lambda: return esp_get_free_heap_size() / 1024.0f;
    update_interval: 10s

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip
      name: "IP Address"
    ssid:
      id: wifi_ssid_ts
      name: "SSID"

# ─── Bluetooth Proxy ──────────────────────────────────────────────────────────
bluetooth_proxy:
  active: true

esp32_ble_tracker:
  scan_parameters:
    active: false

# ─── Backlight (GPIO7 → SS8050 NPN transistor, HIGH = on) ────────────────────
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO7

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    icon: "mdi:monitor"
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# ─── Display (ST7789, 1.14" 240×135 landscape) ───────────────────────────────
# Panel shares the same controller addressing as TTGO T-Display 135×240:
#   offset_width=52, offset_height=40 (within the 240×320 controller RAM).
# width/height are declared as portrait (135×240); rotation: 270 maps the
# lambda canvas to landscape (240×135).
# ⚠ If the image appears mirrored or rotated 180°, change rotation to 90.
spi:
  clk_pin:  GPIO12
  mosi_pin: GPIO11

font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 13
    bpp: 4
  - file: "gfonts://Roboto Mono"
    id: font_medium
    size: 18
    bpp: 4
  - file: "gfonts://Roboto Mono"
    id: font_large
    size: 24
    bpp: 4

display:
  - platform: st7789v
    id: main_display
    model: CUSTOM
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    rotation: 270
    cs_pin:    GPIO10
    dc_pin:    GPIO8
    reset_pin: GPIO9
    update_interval: 1s
    lambda: |-
      // ── Background ──────────────────────────────────────────────────────
      it.fill(Color(0x0D, 0x1B, 0x2A));  // dark navy

      // ── Title bar ───────────────────────────────────────────────────────
      it.printf(4, 4, id(font_small), Color(0x58, 0xA6, 0xFF),
                "WS-S3-GEEK");
      it.printf(236, 4, id(font_small), Color(0x79, 0xC0, 0xFF),
                TextAlign::TOP_RIGHT,
                "%s", id(wifi_ip).state.c_str());

      // ── Divider ─────────────────────────────────────────────────────────
      it.horizontal_line(0, 22, 240, Color(0x1F, 0x3A, 0x52));

      // ── Row 1: Chip Temperature + Free Heap ─────────────────────────────
      float t = id(chip_temp).state;
      Color t_color = isnan(t)      ? Color(0x40, 0x40, 0x60) :
                      (t >= 75.0f)  ? Color(0xFF, 0x7B, 0x72) :  // red   >= 75°C
                      (t >= 60.0f)  ? Color(0xF7, 0x8C, 0x00) :  // amber >= 60°C
                                      Color(0x3F, 0xB9, 0x50);   // green < 60°C
      if (!isnan(t)) {
        it.printf(4, 30, id(font_large), t_color, "%.1f\xc2\xb0""C", t);
      } else {
        it.printf(4, 30, id(font_large), t_color, "---\xc2\xb0""C");
      }

      float heap = id(free_heap_kb).state;
      Color h_color = isnan(heap)       ? Color(0x40, 0x40, 0x60) :
                      (heap < 50.0f)    ? Color(0xFF, 0x7B, 0x72) :  // red   < 50 KB
                      (heap < 100.0f)   ? Color(0xF7, 0x8C, 0x00) :  // amber < 100 KB
                                          Color(0x7E, 0xE7, 0x87);   // green >= 100 KB
      if (!isnan(heap)) {
        it.printf(236, 30, id(font_large), h_color,
                  TextAlign::TOP_RIGHT, "%.0fKB", heap);
      }

      // Sub-labels
      it.printf(  4, 57, id(font_small), Color(0x3A, 0x5A, 0x77), "CHIP TEMP");
      it.printf(236, 57, id(font_small), Color(0x3A, 0x5A, 0x77),
                TextAlign::TOP_RIGHT, "HEAP FREE");

      // ── Divider ─────────────────────────────────────────────────────────
      it.horizontal_line(0, 73, 240, Color(0x1F, 0x3A, 0x52));

      // ── Row 2: WiFi RSSI + Uptime ───────────────────────────────────────
      float rssi = id(wifi_rssi).state;
      Color r_color = isnan(rssi)        ? Color(0x40, 0x40, 0x60) :
                      (rssi > -60.0f)    ? Color(0x3F, 0xB9, 0x50) :  // green  > -60
                      (rssi > -75.0f)    ? Color(0xF7, 0x8C, 0x00) :  // amber  > -75
                                           Color(0xFF, 0x7B, 0x72);   // red   <= -75
      if (!isnan(rssi)) {
        it.printf(4, 80, id(font_medium), r_color, "%.0fdBm", rssi);
      }

      // Uptime: format as Xd Xh when days > 0, else Xh Xm
      uint32_t up  = (uint32_t) id(uptime_sensor).state;
      uint32_t d   = up / 86400;
      uint32_t h   = (up % 86400) / 3600;
      uint32_t m   = (up % 3600) / 60;
      if (d > 0) {
        it.printf(236, 80, id(font_medium), Color(0xD2, 0xA8, 0xFF),
                  TextAlign::TOP_RIGHT, "%ud %uh", d, h);
      } else {
        it.printf(236, 80, id(font_medium), Color(0xD2, 0xA8, 0xFF),
                  TextAlign::TOP_RIGHT, "%uh %um", h, m);
      }

      it.printf(  4, 102, id(font_small), Color(0x3A, 0x5A, 0x77), "WIFI RSSI");
      it.printf(236, 102, id(font_small), Color(0x3A, 0x5A, 0x77),
                TextAlign::TOP_RIGHT, "UPTIME");

      // ── Divider ─────────────────────────────────────────────────────────
      it.horizontal_line(0, 117, 240, Color(0x1F, 0x3A, 0x52));

      // ── Footer: SSID + BLE proxy indicator ──────────────────────────────
      it.printf(4, 121, id(font_small), Color(0x4A, 0x6A, 0x85),
                "%.20s", id(wifi_ssid_ts).state.c_str());
      it.printf(236, 121, id(font_small), Color(0x3F, 0xB9, 0x50),
                TextAlign::TOP_RIGHT, "[BLE]");
