      auto p = id(voice_assistant_phase);
      Color c = (p==2) ? Color(0x7E,0xE7,0x87) :
                (p==3) ? Color(0xD2,0xA8,0xFF) :
                (p==4) ? Color(0x8A,0xB4,0xF8) :
                (p==11) ? Color(0xFF,0x7B,0x72) :
                (p==12) ? Color(0xA7,0xB1,0xBC) :
                (p==10) ? Color(0xFF,0xB8,0x6C) :
                Color(0xFF,0xFF,0xFF);
      const char* ph = (p==1)?"Ready":(p==2)?"Listening":(p==3)?"Thinking":
