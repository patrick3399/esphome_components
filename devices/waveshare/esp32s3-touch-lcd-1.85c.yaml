# ─── Hardware version: V1 ────────────────────────────────────────────────────
# Audio: PCM5101APWR DAC (I2S, no I2C) + NS8002 amp (always-on) + MEMS digital mic
# GPIO2=MIC_WS  GPIO15=MIC_SCK  GPIO39=MIC_SD  GPIO47=I2S_DIN  GPIO38=LRCK  GPIO48=BCK
# NO QMI8658 IMU, NO ES8311, NO ES7210 on this board.
# V2 differences: ES8311 codec (0x18) + ES7210 ADC (0x40) + GPIO2=MCLK + GPIO15=PA_CTRL
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  devicename: "ws-185c"
  upper_devicename: "WS-1.85C"

esphome:
  name: $devicename
  friendly_name: $upper_devicename
  on_boot:
    - priority: 600
      then:
        - pcf85063.read_time
    - priority: -100
      then:
        - light.turn_on:
            id: backlight
            brightness: 80%

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
  partitions:
    - name: model
      type: data
      subtype: undefined
      size: 0x600000  # 6MB WakeNet model; on-device wake word needs serial flash

psram:
  mode: octal
  speed: 80MHz

packages:
  common: !include ../../packages/common.yaml

external_components:
  - source: github://patrick3399/esphome_components
    components: [esp_sr_wake_word]
    refresh: 0s

globals:
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: "10"  # 10=not_ready 1=idle 2=listening 3=thinking 4=replying 11=error 12=muted

logger:
  baud_rate: 0
  level: DEBUG

api:
  reboot_timeout: 4h
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 4h

# ─── I2C (shared: touch / RTC / GPIO expander / IMU / audio codecs) ─────────
i2c:
  id: main_i2c
  sda: GPIO11
  scl: GPIO10
  scan: false
  frequency: 400kHz

# ─── GPIO Expander (TCA9554PWR, pca9554-compatible, addr 0x20) ──────────────
# EXIO0 = TP_RST   EXIO1 = LCD_RST   EXIO2 = SD_D3   EXIO3 = RTC_INT
pca9554:
  - id: tca9554_dev
    i2c_id: main_i2c
    address: 0x20

# ─── RTC (PCF85063) ──────────────────────────────────────────────────────────
time:
  - platform: pcf85063
    id: rtc_time
    i2c_id: main_i2c
    update_interval: never
  - platform: homeassistant
    on_time_sync:
      then:
        - pcf85063.write_time

# ─── Audio (V1: PCM5101 DAC + NS8002 amp + MEMS mic) ─────────────────────────
# Mic and speaker share BCK/LRCK via separate I2S bus instances so each
# can declare its own CLK pins (mic uses GPIO2/GPIO15, speaker uses GPIO38/GPIO48).
i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin: GPIO38
    i2s_bclk_pin: GPIO48
  - id: i2s_in
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO15

speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO47
    dac_type: external
    channel: stereo

microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO39
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit

# ─── Backlight ───────────────────────────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO5
    id: backlight_output

switch:
  - platform: gpio
    pin: GPIO18
    id: lcd_te
    internal: true

  - platform: template
    name: "Microphone Mute"
    id: mic_mute
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = 12;
      - component.update: main_display
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = 1;
      - component.update: main_display

light:
  - platform: monochromatic
    name: "Backlight"
    id: backlight
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

select:
  - platform: template
    entity_category: config
    name: "Wake Word Engine"
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - "In Home Assistant"
      - "On device"
    initial_option: "In Home Assistant"
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - esp_sr_wake_word.stop:
                  - lambda: id(va).set_use_wake_word(true);
                  - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop:
                  - esp_sr_wake_word.start:

  - platform: template
    entity_category: config
    name: "Wake Word Model"
    id: wake_word_model_select
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - "Hi Lily"
      - "Hi ESP"
      - "Hi Lexin"
    initial_option: "Hi Lily"
    on_value:
      - if:
          condition:
            lambda: return x == "Hi Lily";
          then:
            - esp_sr_wake_word.enable_model: esp_sr_hilili
      - if:
          condition:
            lambda: return x == "Hi ESP";
          then:
            - esp_sr_wake_word.enable_model: esp_sr_hiesp
      - if:
          condition:
            lambda: return x == "Hi Lexin";
          then:
            - esp_sr_wake_word.enable_model: esp_sr_hilexin
      - if:
          condition:
            and:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
              - switch.is_off: mic_mute
          then:
            - esp_sr_wake_word.start:

# ─── Sensors ─────────────────────────────────────────────────────────────────
sensor:
  - platform: adc
    pin: GPIO8
    name: "Battery Voltage"
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 2.0  # on-board voltage divider

  - platform: internal_temperature
    name: "Chip Temp"
    update_interval: 30s

  - platform: sound_level
    microphone: i2s_microphone
    passive: true
    measurement_duration: 500ms
    rms:
      name: "Mic RMS Level"
      id: mic_rms_level
    peak:
      name: "Mic Peak Level"
      id: mic_peak_level

# ─── Voice Assistant ─────────────────────────────────────────────────────────
# ESP-SR on-device wake word requires serial flash (model partition 6MB).
# Default "In Home Assistant" mode works immediately after OTA.
esp_sr_wake_word:
  id: esp_sr_ww
  microphone: i2s_microphone
  stop_after_detection: true
  models:
    - id: esp_sr_hilili
      model: wn9_hilili_tts
    - id: esp_sr_hiesp
      model: wn9_hiesp
    - id: esp_sr_hilexin
      model: wn9_hilexin
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: i2s_microphone
  media_player: va_media_player
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - lambda: id(voice_assistant_phase) = 2;
    - component.update: main_display
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = 3;
    - component.update: main_display
  on_tts_start:
    - lambda: id(voice_assistant_phase) = 4;
    - component.update: main_display
  on_end:
    - wait_until:
        not:
          speaker.is_playing:
    - script.execute: set_idle_or_mute_phase
    - if:
        condition:
          lambda: return id(wake_word_engine_location).current_option() == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - esp_sr_wake_word.start:
    - component.update: main_display
  on_error:
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = 11;
          - component.update: main_display
          - delay: 2s
          - script.execute: set_idle_or_mute_phase
          - component.update: main_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - component.update: main_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = 10;
    - component.update: main_display

media_player:
  - platform: speaker
    name: "Voice Assistant"
    id: va_media_player
    volume_initial: 0.7
    announcement_pipeline:
      speaker: i2s_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# ─── Display (QSPI round 360×360, init sequence from Waveshare sample) ───────
spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  data_pins: [GPIO46, GPIO45, GPIO42, GPIO41]

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: roboto_clock
    size: 60
  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: roboto_label
    size: 22

display:
  - platform: qspi_dbi
    model: CUSTOM
    id: main_display
    spi_id: display_qspi
    data_rate: 40MHz
    invert_colors: true
    color_order: rgb
    dimensions:
      height: 360
      width: 360
    cs_pin: GPIO21
    reset_pin:
      pca9554: tca9554_dev
      number: 1
    auto_clear_enabled: true
