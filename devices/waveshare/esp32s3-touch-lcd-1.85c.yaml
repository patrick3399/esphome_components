                       (p==12)?"Muted":"--";
      it.printf(180, 185, id(roboto_clock), c, TextAlign::CENTER, "%s", ph);
      float rms = id(mic_rms_level).state;
      float peak = id(mic_peak_level).state;
      if (!isnan(rms)) {
        it.printf(180, 255, id(roboto_label), Color(0x80,0xC0,0x80), TextAlign::CENTER,
                  "RMS %.1f dB  Peak %.1f dB", rms, peak);
      } else {
        it.printf(180, 255, id(roboto_label), Color(0x40,0x40,0x60), TextAlign::CENTER, "Mic: waiting...");
      }
      it.printf(180, 295, id(roboto_label), Color(0x50,0x50,0x80), TextAlign::CENTER, "WS-1.85C | V1");

# ─── Touchscreen (CST816S) ────────────────────────────────────────────────────
touchscreen:
  - platform: cst816
    id: my_touchscreen
    i2c_id: main_i2c
    interrupt_pin: GPIO4
    reset_pin:
      pca9554: tca9554_dev
      number: 0
    display: main_display
    on_touch:
      - lambda: |-
          ESP_LOGI("touch", "x=%d y=%d", touch.x, touch.y);

# ─── Bluetooth Proxy ──────────────────────────────────────────────────────────
bluetooth_proxy:
  active: true

esp32_ble_tracker:
  scan_parameters:
    active: false

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Boot Button"
    on_press:
      - if:
          condition:
            and:
              - lambda: return !id(init_in_progress);
              - switch.is_off: mic_mute
              - wifi.connected:
              - api.connected:
          then:
            - script.execute: stop_wake_word
            - delay: 50ms
            - voice_assistant.start:

script:
  - id: start_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - esp_sr_wake_word.start:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:

  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - esp_sr_wake_word.stop:

  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mic_mute
          then:
            - lambda: id(voice_assistant_phase) = 1;
          else:
            - lambda: id(voice_assistant_phase) = 12;
