esphome:
  name: esp32s3-matrix
  friendly_name: ESP32-S3 Matrix

packages:
  common: !include ../../packages/common.yaml

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 6h

# QMI8658 is on GPIO11 (SDA) / GPIO12 (SCL); from hardware testing.
i2c:
  id: main_i2c
  sda: GPIO11
  scl: GPIO12
  scan: false
  frequency: 400kHz

globals:
  - id: display_brightness
    type: float
    initial_value: '0.5'
  # Tilt globals updated at IMU rate (100 ms) for spirit level display
  - id: g_tilt_x
    type: float
    initial_value: '0.0'
  - id: g_tilt_y
    type: float
    initial_value: '0.0'

# ─── QMI8658 6-axis IMU ───────────────────────────────────────────────────────
sensor:
  - platform: qmi8658
    id: imu
    i2c_id: main_i2c
    address: 0x6B
    accelerometer_range: 4G
    gyroscope_range: 256DPS
    # 100 ms for responsive display; HA publish throttled per sensor below
    update_interval: 100ms
    acceleration_x:
      name: "Accel X"
      filters:
        - throttle: 5s
      on_raw_value:
        - lambda: id(g_tilt_x) = x;
    acceleration_y:
      name: "Accel Y"
      filters:
        - throttle: 5s
      on_raw_value:
        - lambda: id(g_tilt_y) = x;
    acceleration_z:
      name: "Accel Z"
      filters:
        - throttle: 5s
    gyroscope_x:
      name: "Gyro X"
      filters:
        - throttle: 5s
    gyroscope_y:
      name: "Gyro Y"
      filters:
        - throttle: 5s
    gyroscope_z:
      name: "Gyro Z"
      filters:
        - throttle: 5s
    temperature:
      name: "IMU Temp"
      filters:
        - throttle: 30s
  - platform: internal_temperature
    name: "Chip Temp"
    update_interval: 30s
    on_value_range:
      above: 75
      then:
        - light.turn_off: board_8x8_light

# ─── 8×8 WS2812B LED Matrix ───────────────────────────────────────────────────
# LED pin from hardware testing (GPIO14). Hardware doc states IO6 — discrepancy
# unresolved; trust the tested value until schematic is verified.
# 64 LEDs total. No pixel_mapper: matrix is wired in simple row-major order.
# gamma_correct: 1.0 disables ESPHome's gamma curve so display colour math is linear.
light:
  - platform: esp32_rmt_led_strip
    id: board_8x8
    internal: true
    pin: GPIO14
    num_leds: 64
    chipset: ws2812
    rgb_order: GRB
    gamma_correct: 1.0

  # Brightness knob: keep below 30% for sustained use; full brightness causes heat.
  - platform: monochromatic
    name: "Display Brightness"
    id: board_8x8_light
    output: board_8x8_output
    gamma_correct: 1.0

output:
  - platform: template
    id: board_8x8_output
    type: float
    write_action:
      - lambda: |-
          id(display_brightness) = state;

display:
  - platform: addressable_light
    id: board_8x8_display
    addressable_light_id: board_8x8
    width: 8
    height: 8
    rotation: 90°
    update_interval: 16ms
    lambda: |-
      if (!id(board_8x8_light).current_values.is_on()) {
        it.fill(Color::BLACK);
        return;
      }

      float brightness = id(display_brightness);
      int bv = (int)(255.0f * brightness);
      if (bv == 2) bv = 1;

      it.fill(Color::BLACK);

      // Spirit level: single LED dot follows the gravity vector in the XY plane.
      // ±4.9 m/s² (≈ ±0.5 g, ~30° tilt) covers the full 8×8 grid edge-to-edge.
      // Positive accel_x = right side lower → dot moves right (higher px).
      // Positive accel_y = front side lower → dot moves down (higher py).
      float scale = 4.9f;
      float fx = 3.5f + (id(g_tilt_x) / scale) * 3.5f;
      float fy = 3.5f + (id(g_tilt_y) / scale) * 3.5f;
      int px = (int)roundf(fx);
      int py = (int)roundf(fy);
      if (px < 0) px = 0; if (px > 7) px = 7;
      if (py < 0) py = 0; if (py > 7) py = 7;

      it.draw_pixel_at(px, py, Color(bv, bv, bv));
