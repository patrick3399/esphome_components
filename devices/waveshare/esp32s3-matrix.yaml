esphome:
  name: esp32s3-matrix
  friendly_name: ESP32-S3 Matrix
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: board_8x8_light
          brightness: 10%

external_components:
  - source: github://patrick3399/esphome_components
    components: [qmi8658]
    refresh: 0s

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 6h


ota:
  - platform: esphome
    password: !secret ota_password



wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 6h

time:
  - platform: homeassistant
    id: homeassistant_time

logger:
  level: DEBUG
  baud_rate: 0
  logs:
    api.service: WARN
    wifi: WARN
    esp-idf: NONE

# QMI8658 is on GPIO11 (SDA) / GPIO12 (SCL); from hardware testing.



debug:
  update_interval: 10s

binary_sensor:
  - platform: status
    id: status_sensor
    name: "Status"
    entity_category: diagnostic

button:
  - platform: restart
    id: restart_button
    name: "Restart"
    entity_category: diagnostic

i2c:
  id: main_i2c
  sda: GPIO11
  scl: GPIO12
  scan: false
  frequency: 400kHz

globals:
  - id: display_brightness
    type: float
    initial_value: '0.1'
  # Tilt globals updated at IMU rate (100 ms) for spirit level display
  - id: g_tilt_x
    type: float
    initial_value: '0.0'
  - id: g_tilt_y
    type: float
    initial_value: '0.0'

# ─── QMI8658 6-axis IMU ───────────────────────────────────────────────────────
sensor:
  - platform: qmi8658
    id: imu
    i2c_id: main_i2c
    address: 0x6B
    accelerometer_range: 4G
    gyroscope_range: 256DPS
    # 100 ms for responsive display; HA publish throttled per sensor below
    update_interval: 100ms
    acceleration_x:
      name: "Accel X"
      filters:
        - throttle: 5s
      on_raw_value:
        - lambda: id(g_tilt_x) = x;
    acceleration_y:
      name: "Accel Y"
      filters:
        - throttle: 5s
      on_raw_value:
        - lambda: id(g_tilt_y) = x;
    acceleration_z:
      name: "Accel Z"
      filters:
        - throttle: 5s
    gyroscope_x:
      name: "Gyro X"
      filters:
        - throttle: 5s
    gyroscope_y:
      name: "Gyro Y"
      filters:
        - throttle: 5s
    gyroscope_z:
      name: "Gyro Z"
      filters:
        - throttle: 5s
    temperature:
      name: "IMU Temp"
      filters:
        - throttle: 30s
  - platform: internal_temperature
    name: "Chip Temp"
    update_interval: 30s
    on_value_range:
      above: 75
      then:
        - light.turn_off: board_8x8_light

# ─── 8×8 WS2812B LED Matrix ───────────────────────────────────────────────────
# LED pin from hardware testing (GPIO14). Hardware doc states IO6 — discrepancy
# unresolved; trust the tested value until schematic is verified.
# 64 LEDs total. No pixel_mapper: matrix is wired in simple row-major order.
# gamma_correct: 1.0 disables ESPHome's gamma curve so display colour math is linear.

  - platform: uptime
    id: uptime_sensor
    name: "Uptime"
    entity_category: diagnostic
    update_interval: 60s
  - platform: debug
    free:
      name: "Heap Free"
      entity_category: "diagnostic"
    block:
      name: "Heap Max Block"
      entity_category: "diagnostic"
    min_free:
      name: "Heap Min Free"
      entity_category: "diagnostic"
    fragmentation:
      name: "Heap Fragmentation"
      entity_category: "diagnostic"
    loop_time:
      name: "Loop Time"
      entity_category: "diagnostic"
    cpu_frequency:
      name: "CPU Frequency"
      entity_category: "diagnostic"
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi RSSI"
    entity_category: diagnostic
    update_interval: 30s
  - platform: copy
    source_id: wifi_signal_sensor
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""
text_sensor:
  - platform: version
    id: firmware_version
    name: "Firmware Version"
    entity_category: diagnostic
    hide_timestamp: true

  - platform: debug
    device:
      name: "Device Info"
      entity_category: diagnostic
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      name: Device IP Address
      entity_category: diagnostic
    ssid:
      name: Device Connected SSID
      entity_category: diagnostic
light:
  - platform: esp32_rmt_led_strip
    id: board_8x8
    internal: true
    pin: GPIO14
    num_leds: 64
    chipset: ws2812
    rgb_order: GRB
    gamma_correct: 1.0

  # Brightness knob: hard cap 50% in display lambda; full brightness causes heat.
  - platform: monochromatic
    name: "Display Brightness"
    id: board_8x8_light
    output: board_8x8_output
    gamma_correct: 1.0
    restore_mode: ALWAYS_ON

output:
  - platform: template
    id: board_8x8_output
    type: float
    write_action:
      - lambda: |-
          id(display_brightness) = state;

display:
  - platform: addressable_light
    id: board_8x8_display
    addressable_light_id: board_8x8
    width: 8
    height: 8
    rotation: 90°
    update_interval: 16ms
    lambda: |-
      if (!id(board_8x8_light).current_values.is_on()) {
        it.fill(Color::BLACK);
        return;
      }

      float brightness = id(display_brightness);
      int bv = (int)(255.0f * brightness);
      if (bv > 127) bv = 127;  // hard cap 50%
      if (bv == 2) bv = 1;

      it.fill(Color::BLACK);

      // Spirit level: single LED dot follows the gravity vector in the XY plane.
      // ±4.9 m/s² (≈ ±0.5 g, ~30° tilt) covers the full 8×8 grid edge-to-edge.
      // Positive accel_x = right side lower → dot moves right (higher px).
      // Positive accel_y = front side lower → dot moves down (higher py).
      float scale = 4.9f;
      float fx = 3.5f + (id(g_tilt_x) / scale) * 3.5f;
      float fy = 3.5f + (id(g_tilt_y) / scale) * 3.5f;
      int px = (int)roundf(fx);
      int py = (int)roundf(fy);
      if (px < 0) px = 0; if (px > 7) px = 7;
      if (py < 0) py = 0; if (py > 7) py = 7;

      it.draw_pixel_at(px, py, Color(bv, bv, bv));
