esphome:
  name: wled-bridge-multibus-poc
  friendly_name: WLED Bridge Multi-Bus PoC

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source: github://patrick3399/esphome_components
    components: [wled_bridge]

light:
  - platform: esp32_rmt_led_strip
    id: led_bus_a
    name: "LED Bus A"
    pin: GPIO38
    num_leds: 96
    chipset: WS2812
    rgb_order: GRB
    use_dma: true
    use_psram: true
    gamma_correct: 0.0
    color_correct: [1.0, 1.0, 1.0]

  - platform: esp32_rmt_led_strip
    id: led_bus_b
    name: "LED Bus B"
    pin: GPIO39
    num_leds: 48
    chipset: WS2812
    rgb_order: GRB
    use_dma: true
    use_psram: true
    gamma_correct: 0.0
    color_correct: [1.0, 1.0, 1.0]

wled_bridge:
  buses:
    - light_id: led_bus_a
      max_ma: 3500
      led_ma: 55
    - light_id: led_bus_b
      max_ma: 1500
      led_ma: 35
  use_task: false
  auto_white: none
