esphome:
  name: wled-bridge-realtime-poc
  friendly_name: WLED Bridge Realtime PoC

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source: github://patrick3399/esphome_components
    components: [wled_bridge]

light:
  - platform: esp32_rmt_led_strip
    id: my_leds
    name: "LED Strip Realtime"
    pin: GPIO38
    num_leds: 340        # Two E1.31 universes at 170 RGB pixels each
    chipset: WS2812
    rgb_order: GRB
    use_dma: true
    use_psram: true
    gamma_correct: 0.0
    color_correct: [1.0, 1.0, 1.0]

wled_bridge:
  light_id: my_leds
  max_ma: 10000
  led_ma: 55
  use_task: false
  auto_white: none

  # WLED-like power cap before ABL; exercises BF codegen path.
  brightness_factor: 80

  # Startup preset selection; preset slot may be populated later from UI/API.
  boot_preset: 1

  # WLED notifier sync.
  udp_send: true
  udp_receive: true
  udp_port: 21324
  udp_port2: 65506

  # Realtime receivers (nested schema, Layer C).
  realtime:
    ddp: true
    e131: true
    e131_universe: 1
    e131_universes: 2
    artnet: true
    artnet_universe: 0
    artnet_universes: 2
