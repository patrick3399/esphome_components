esphome:
  name: wled-bridge-audio-poc
  friendly_name: WLED Bridge Audio PoC

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source: github://patrick3399/esphome_components
    components: [wled_bridge]

i2s_audio:
  i2s_lrclk_pin: GPIO3
  i2s_bclk_pin: GPIO4

microphone:
  - platform: i2s_audio
    id: my_mic
    i2s_din_pin: GPIO5
    adc_type: external
    pdm: false
    bits_per_sample: 16bit
    sample_rate: 22050

light:
  - platform: esp32_rmt_led_strip
    id: my_leds
    name: "LED Strip"
    pin: GPIO38
    num_leds: 144
    chipset: WS2812
    rgb_order: GRB
    use_dma: true
    use_psram: true
    gamma_correct: 0.0
    color_correct: [1.0, 1.0, 1.0]

wled_bridge:
  light_id: my_leds
  max_ma: 5000
  led_ma: 55
  audio:
    microphone: my_mic
    passive: true
    fft: true
    agc: true
