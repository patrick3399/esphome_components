esphome:
  name: wled-bridge-poc
  friendly_name: WLED Bridge PoC

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source: github://patrick3399/esphome_components
    components: [wled_bridge]

light:
  - platform: esp32_rmt_led_strip
    id: my_leds
    name: "LED Strip"
    pin: GPIO38
    num_leds: 144
    chipset: WS2812
    rgb_order: GRB
    use_dma: true
    use_psram: true
    # Let WLED bridge own gamma and colour correction
    gamma_correct: 0.0
    color_correct: [1.0, 1.0, 1.0]

wled_bridge:
  light_id: my_leds
  max_ma: 5000      # ABL: maximum milliamps for the strip
  led_ma: 55        # WS2812B: ~55 mA per LED at full white
  use_task: false   # true = dedicated FreeRTOS render task on core 1
