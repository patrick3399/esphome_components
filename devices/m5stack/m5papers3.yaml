esphome:
  name: m5papers3
  friendly_name: m5papers3
  build_path: /config/esphome/m5papers3
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
  libraries:
    - EPDIY=https://github.com/patrick3399/epdiy
  includes:
    - m5papers3_helpers.h
  on_boot:
    then:
      - rtttl.play: 'siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e'
      - delay: 5s
      - script.execute: update_status
      - script.execute: update_time
      # Set flag so on_refr_ready triggers the initial GC16 after LVGL renders
      - lambda: id(pending_full_refresh) = true;
      # Wait for LVGL render + GC16 (~600ms) to complete before enabling triggers
      - delay: 3s
      - lambda: |-
          id(system_initialized) = true;

packages:
  ha: !include ../../packages/common-ha.yaml
  wifi: !include ../../packages/common-wifi.yaml

external_components:
  - source: github://patrick3399/esphome_components
    components: [bmi270, ed047tc1]
    refresh: 0s

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    version: latest
    sdkconfig_options:
      CONFIG_EPD_OUTPUT_LUT_ASSEMBLY: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"

globals:
  - id: system_initialized
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pending_partial_refresh
    type: bool
    initial_value: 'false'
  - id: pending_full_refresh
    type: bool
    initial_value: 'false'
  - id: current_page
    type: int
    initial_value: '0'
    # 0=main, 1=imu, 2=system, 3=rtttl

psram:
  mode: octal
  speed: 80MHz

api:
  reboot_timeout: 6h

logger:
  level: DEBUG
  baud_rate: 0
  logs:
    api.service: WARN
    wifi: WARN
    esp-idf: NONE

interval:
  - interval: 8s
    then:
      - light.turn_on: statled
      - delay: 1s
      - light.turn_off: statled

debug:
  update_interval: 10s

i2c:
  sda: GPIO41
  scl: GPIO42
  scan: true
  id: bus_internal
  frequency: 200kHz

touchscreen:
  platform: gt911
  id: my_touchscreen
  interrupt_pin: GPIO48
  transform:
    mirror_x: true
    mirror_y: true
    swap_xy: false

light:
  - platform: monochromatic
    id: statled
    name: "Status LED"
    output: gpio_0
    restore_mode: ALWAYS_OFF
    internal: true
    disabled_by_default: true

output:
  - platform: ledc
    id: rtttl_pin
    pin: 21
  - platform: ledc
    id: gpio_0
    pin: 0
    inverted: true

rtttl:
  output: rtttl_pin
  id: rtttl_buzz
  gain: 60%

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
      id: reset_reason_val

sensor:
  - platform: debug
    free:
      name: "Heap Free"
      id: heap_free_val
      on_value:
        - if:
            condition:
              lambda: 'return id(system_initialized) && id(current_page) == 2;'
            then:
              - script.execute: update_system
              - lambda: id(pending_partial_refresh) = true;
    block:
      name: "Heap Max Block"
      id: heap_block_val
    loop_time:
      name: "Loop Time"
      id: loop_time_val
    psram:
      name: "Free PSRAM"
      id: free_psram_val
  - platform: internal_temperature
    name: "Chip Temp"
    id: chip_temp_val
  - platform: adc
    pin: GPIO3
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 2.0
    on_value:
      - if:
          condition:
            lambda: 'return id(system_initialized);'
          then:
            - script.execute: update_status
            - lambda: id(pending_partial_refresh) = true;
  - platform: adc
    pin: GPIO5
    name: "USB DET"
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: bmi270
    address: 0x68
    acceleration_x:
      name: "BMI270 Accel X"
      id: accel_x_val
    acceleration_y:
      name: "BMI270 Accel Y"
      id: accel_y_val
    acceleration_z:
      name: "BMI270 Accel Z"
      id: accel_z_val
      on_value:
        - if:
            condition:
              lambda: 'return id(system_initialized) && id(current_page) == 1;'
            then:
              - script.execute: update_imu
              - lambda: id(pending_partial_refresh) = true;
    gyroscope_x:
      name: "BMI270 Gyro X"
      id: gyro_x_val
    gyroscope_y:
      name: "BMI270 Gyro Y"
      id: gyro_y_val
    gyroscope_z:
      name: "BMI270 Gyro Z"
      id: gyro_z_val
    temperature:
      name: "BMI270 Temperature"
      id: bmi270_temp_val
    power_save_mode: LOW_POWER
    update_interval: 60s

binary_sensor:
  - platform: gpio
    pin:
      number: 4
      inverted: true
    id: charge_status
    name: "Charge Status"
    device_class: battery_charging
    on_state:
      - if:
          condition:
            lambda: 'return id(system_initialized);'
          then:
            - script.execute: update_status
            - lambda: id(pending_partial_refresh) = true;

time:
  # bm8563 drives display updates — always available, no HA dependency
  - platform: bm8563
    id: bm8563_time
    timezone: Asia/Taipei
    update_interval: 30s
    on_time:
      - seconds: 0
        then:
          - if:
              condition:
                lambda: 'return id(system_initialized);'
              then:
                - script.execute: update_time
                # Hourly: GC16 full refresh (ghost clearing); otherwise GL16 partial
                - lambda: |-
                    auto now = id(bm8563_time).now();
                    if (now.is_valid() && now.minute == 0) {
                      id(pending_full_refresh) = true;
                    } else {
                      id(pending_partial_refresh) = true;
                    }
  # homeassistant_time: time sync only — no on_time display trigger
  - id: !extend homeassistant_time
    timezone: Asia/Taipei
    update_interval: 1h
    on_time_sync:
      then:
        bm8563.write_time:
          id: bm8563_time

font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 128
    bpp: 4
    glyphs: "0123456789: "
  - file: "gfonts://Noto+Sans+TC"
    id: font_date
    size: 52
    bpp: 4
    glyphs: "0123456789月日星期一二三四五六 "
  - file: "gfonts://Roboto"
    id: font_status
    size: 38
    bpp: 4
    glyphs: "0123456789% "
  - file: "gfonts://Roboto"
    id: font_title
    size: 52
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz "
  - file: "gfonts://Roboto"
    id: font_small
    size: 30
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.:+-/%<> "
  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/fonts/materialdesignicons-webfont.ttf"
    id: font_mdi
    size: 48
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi:wifi
      - "\U000F05AA"  # mdi:wifi-off
      - "\U000F0564"  # mdi:server-network
      - "\U000F0565"  # mdi:server-network-off
      - "\U000F007A"  # mdi:battery-outline  (0%)
      - "\U000F007B"  # mdi:battery-10
      - "\U000F007C"  # mdi:battery-20
      - "\U000F007D"  # mdi:battery-30
      - "\U000F007E"  # mdi:battery-40
      - "\U000F007F"  # mdi:battery-50
      - "\U000F0080"  # mdi:battery-60
      - "\U000F0081"  # mdi:battery-70
      - "\U000F0082"  # mdi:battery-80
      - "\U000F0086"  # mdi:battery-90
      - "\U000F0079"  # mdi:battery (100%)
      - "\U000F0295"  # mdi:lightning-bolt
      - "\U000F0141"  # mdi:chevron-left
      - "\U000F0142"  # mdi:chevron-right

display:
  - platform: ed047tc1
    id: ed047tc1_display
    pwr_pin: GPIO45
    bst_en_pin: GPIO46
    xstl_pin: GPIO13
    xle_pin: GPIO15
    spv_pin: GPIO17
    ckv_pin: GPIO18
    pclk_pin: GPIO16
    d0_pin: GPIO6
    d1_pin: GPIO14
    d2_pin: GPIO7
    d3_pin: GPIO12
    d4_pin: GPIO9
    d5_pin: GPIO11
    d6_pin: GPIO8
    d7_pin: GPIO10
    update_interval: never

lvgl:
  displays:
    - ed047tc1_display
  touchscreens:
    - my_touchscreen
  buffer_size: 10%
  # Fix 2: false = only re-render dirty regions; the rest of the buffer retains
  # the previous correct content, so full-screen partial_update() is still valid
  full_refresh: false
  draw_rounding: 8
  rotation: 90
  bg_color: 0xFFFFFF
  default_font: font_date

  # Fix 1: on_refr_ready fires AFTER LVGL has rendered all dirty regions to the
  # ed047tc1 buffer — only then trigger the hardware e-paper refresh.
  # This eliminates the race condition where partial_update() ran before LVGL
  # had written new label text into the buffer.
  on_refr_ready:
    - lambda: |-
        if (id(pending_full_refresh)) {
          id(pending_full_refresh) = false;
          id(pending_partial_refresh) = false;
          id(ed047tc1_display).update();
        } else if (id(pending_partial_refresh)) {
          id(pending_partial_refresh) = false;
          id(ed047tc1_display).partial_update(0, 0, 960, 540);
        }

  # Periodic ghost clearing: fires when no touch input for 10 min.
  # Direct call (no flag) — buffer already has current content, no label update needed.
  # Light sleep at 30 min idle.
  on_idle:
    - timeout: 10min
      then:
        - lambda: id(ed047tc1_display).update();
    # Light sleep disabled — re-enable after stability verified
    # - timeout: 30min
    #   then:
    #     - if:
    #         condition:
    #           lambda: 'return id(system_initialized);'
    #         then:
    #           - lambda: |-
    #               gpio_wakeup_enable(GPIO_NUM_48, GPIO_INTR_LOW_LEVEL);
    #               esp_sleep_enable_gpio_wakeup();
    #               esp_light_sleep_start();
    #               gpio_wakeup_enable(GPIO_NUM_48, GPIO_INTR_LOW_LEVEL);
    #               esp_sleep_enable_gpio_wakeup();

  pages:
    - id: main_page
      bg_color: 0xFFFFFF
      widgets:
        # Border frame
        - obj:
            id: border_frame
            x: 8
            y: 8
            width: 524
            height: 944
            bg_opa: TRANSP
            border_color: 0x000000
            border_width: 2
            radius: 0
            scrollable: false
            scrollbar_mode: "OFF"

        # Status left: WiFi + API icons
        - obj:
            id: status_left
            x: 18
            y: 14
            width: 120
            height: 52
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            pad_all: 0
            scrollable: false
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: START
              flex_align_cross: CENTER
              pad_column: 6
            widgets:
              - label:
                  id: lbl_wifi
                  text: "\U000F05AA"
                  text_font: font_mdi
                  text_color: 0x000000
              - label:
                  id: lbl_api
                  text: "\U000F0565"
                  text_font: font_mdi
                  text_color: 0x000000

        # Status right: battery% + charging bolt + battery level icon
        - obj:
            id: status_right
            align: TOP_RIGHT
            x: -18
            y: 14
            width: 230
            height: 52
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            pad_all: 0
            scrollable: false
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: END
              flex_align_cross: CENTER
              pad_column: 4
            widgets:
              - label:
                  id: lbl_batt_pct
                  text: "--%"
                  text_font: font_status
                  text_color: 0x000000
              - label:
                  id: lbl_bolt
                  text: "\U000F0295"
                  text_font: font_mdi
                  text_color: 0x000000
                  hidden: true
              - label:
                  id: lbl_batt_icon
                  text: "\U000F007A"
                  text_font: font_mdi
                  text_color: 0x000000

        # Date
        - label:
            id: lbl_date
            align: TOP_MID
            y: 90
            text: "--月--日 星期-"
            text_font: font_date
            text_color: 0x000000
            text_align: CENTER

        # Time area — tap: GL16 refresh (direct, no label change);
        # long-press: GC16 full refresh (direct, no label change)
        - obj:
            id: time_area
            align: TOP_MID
            y: 170
            width: 500
            height: 175
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: true
            on_click:
              - if:
                  condition:
                    lambda: 'return id(system_initialized);'
                  then:
                    # Direct call: no label update pending, buffer is current
                    - lambda: id(ed047tc1_display).partial_update(0, 0, 960, 540);
            on_long_press:
              - lambda: id(ed047tc1_display).update();
            widgets:
              - label:
                  id: lbl_time
                  align: CENTER
                  text: "--:--"
                  text_font: font_time
                  text_color: 0x000000

        # Separator line
        - line:
            id: separator
            points:
              - "20, 430"
              - "520, 430"
            line_color: 0x000000
            line_width: 2

        # Nav bar: left="< RTTTL", center="Clock", right="IMU >"
        - obj:
            id: nav_main
            align: BOTTOM_MID
            y: -15
            width: 510
            height: 65
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            pad_all: 0
            scrollable: false
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              # Left: < RTTTL
              - obj:
                  width: 80
                  height: 65
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  pad_all: 6
                  scrollable: false
                  scrollbar_mode: "OFF"
                  clickable: true
                  on_click:
                    - lvgl.page.show: rtttl_page
                    - lambda: |-
                        id(current_page) = 3;
                        id(pending_full_refresh) = true;
                  widgets:
                    - label:
                        text: "< RTTTL"
                        text_font: font_small
                        text_color: 0x000000
              # Center: Clock
              - label:
                  text: "Clock"
                  text_font: font_small
                  text_color: 0x000000
              # Right: IMU >
              - obj:
                  width: 80
                  height: 65
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  pad_all: 6
                  scrollable: false
                  scrollbar_mode: "OFF"
                  clickable: true
                  on_click:
                    - script.execute: update_imu
                    - lvgl.page.show: imu_page
                    - lambda: |-
                        id(current_page) = 1;
                        id(pending_full_refresh) = true;
                  widgets:
                    - label:
                        text: "IMU >"
                        text_font: font_small
                        text_color: 0x000000

    - id: imu_page
      bg_color: 0xFFFFFF
      widgets:
        # Border frame
        - obj:
            x: 8
            y: 8
            width: 524
            height: 944
            bg_opa: TRANSP
            border_color: 0x000000
            border_width: 2
            radius: 0
            scrollable: false
            scrollbar_mode: "OFF"

        # Title: IMU
        - label:
            align: TOP_MID
            y: 25
            text: "IMU"
            text_font: font_title
            text_color: 0x000000

        # Accel X
        - label:
            x: 30
            y: 120
            text: "Accel X:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_accel_x
            x: 290
            y: 120
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Accel Y
        - label:
            x: 30
            y: 185
            text: "Accel Y:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_accel_y
            x: 290
            y: 185
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Accel Z
        - label:
            x: 30
            y: 250
            text: "Accel Z:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_accel_z
            x: 290
            y: 250
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Separator line
        - line:
            points:
              - "30, 320"
              - "510, 320"
            line_color: 0x000000
            line_width: 2

        # Gyro X
        - label:
            x: 30
            y: 345
            text: "Gyro X:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_gyro_x
            x: 290
            y: 345
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Gyro Y
        - label:
            x: 30
            y: 410
            text: "Gyro Y:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_gyro_y
            x: 290
            y: 410
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Gyro Z
        - label:
            x: 30
            y: 475
            text: "Gyro Z:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_gyro_z
            x: 290
            y: 475
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Separator line
        - line:
            points:
              - "30, 545"
              - "510, 545"
            line_color: 0x000000
            line_width: 2

        # Temperature
        - label:
            x: 30
            y: 570
            text: "Temp:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_bmi270_temp
            x: 290
            y: 570
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Nav bar: left="< Clock", center="IMU", right="Sys >"
        - obj:
            id: nav_imu
            align: BOTTOM_MID
            y: -15
            width: 510
            height: 65
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            pad_all: 0
            scrollable: false
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              # Left: < Clock
              - obj:
                  width: 80
                  height: 65
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  pad_all: 6
                  scrollable: false
                  scrollbar_mode: "OFF"
                  clickable: true
                  on_click:
                    - lvgl.page.show: main_page
                    - lambda: |-
                        id(current_page) = 0;
                        id(pending_full_refresh) = true;
                  widgets:
                    - label:
