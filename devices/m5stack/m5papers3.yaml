            x: 30
            y: 120
            text: "Heap:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_heap_free
            x: 280
            y: 120
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Heap Block
        - label:
            x: 30
            y: 185
            text: "Block:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_heap_block
            x: 280
            y: 185
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Free PSRAM
        - label:
            x: 30
            y: 250
            text: "PSRAM:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_free_psram
            x: 280
            y: 250
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Loop Time
        - label:
            x: 30
            y: 315
            text: "Loop:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_loop_time
            x: 280
            y: 315
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Chip Temp
        - label:
            x: 30
            y: 380
            text: "Chip:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_chip_temp
            x: 280
            y: 380
            text: "---"
            text_font: font_small
            text_color: 0x000000

        # Separator line
        - line:
            points:
              - "30, 450"
              - "510, 450"
            line_color: 0x000000
            line_width: 2

        # Reset Reason
        - label:
            x: 30
            y: 475
            text: "Reset:"
            text_font: font_small
            text_color: 0x000000
        - label:
            id: lbl_reset_reason
            x: 30
            y: 515
            width: 480
            text: "---"
            text_font: font_small
            text_color: 0x000000
            text_align: LEFT

        # Nav bar: left="< IMU", center="System", right="RTTTL >"
        - obj:
            id: nav_system
            align: BOTTOM_MID
            y: -15
            width: 510
            height: 65
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
