script:
  # Scripts only update LVGL labels; callers are responsible for setting
  # pending_partial_refresh or pending_full_refresh to trigger hardware refresh
  - id: update_time
    mode: restart
    then:
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto now = id(homeassistant_time).now();
            if (!now.is_valid()) now = id(bm8563_time).now();
            if (!now.is_valid()) return std::string("--月--日 星期-");
            const char* dow_cn[] = {"?", "日", "一", "二", "三", "四", "五", "六"};
            char buf[32];
            snprintf(buf, sizeof(buf), "%02d月%02d日 星期%s",
                     now.month, now.day_of_month, dow_cn[now.day_of_week]);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_time
          text: !lambda |-
            auto now = id(homeassistant_time).now();
            if (!now.is_valid()) now = id(bm8563_time).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[8];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);

  - id: update_status
    mode: restart
    then:
      - lvgl.label.update:
          id: lbl_wifi
          text: !lambda |-
            return std::string(wifi::global_wifi_component->is_connected()
                               ? "\U000F05A9" : "\U000F05AA");
      - lvgl.label.update:
          id: lbl_api
          text: !lambda |-
            return std::string(api::global_api_server->is_connected()
                               ? "\U000F0564" : "\U000F0565");
      - lvgl.label.update:
          id: lbl_batt_pct
          text: !lambda |-
            float v = id(battery_voltage).state;
            int pct = (int)std::max(0.0f, std::min(100.0f, (v - 3.0f) / 1.2f * 100.0f));
            char buf[8];
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_batt_icon
          text: !lambda |-
            const char* icons[] = {
              "\U000F007A", "\U000F007B", "\U000F007C", "\U000F007D", "\U000F007E",
              "\U000F007F", "\U000F0080", "\U000F0081", "\U000F0082", "\U000F0086",
              "\U000F0079"
            };
            float v = id(battery_voltage).state;
            int pct = (int)std::max(0.0f, std::min(100.0f, (v - 3.0f) / 1.2f * 100.0f));
            return std::string(icons[std::min(10, pct / 10)]);
      - if:
          condition:
            lambda: 'return id(charge_status).state;'
          then:
            - lvgl.widget.show: lbl_bolt
          else:
            - lvgl.widget.hide: lbl_bolt

  - id: update_imu
    mode: restart
    then:
      - lvgl.label.update:
          id: lbl_accel_x
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.2f", id(accel_x_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_accel_y
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.2f", id(accel_y_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_accel_z
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.2f", id(accel_z_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_gyro_x
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.2f", id(gyro_x_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_gyro_y
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.2f", id(gyro_y_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_gyro_z
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.2f", id(gyro_z_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_bmi270_temp
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.1f C", id(bmi270_temp_val).state); return std::string(buf);

  - id: update_system
    mode: restart
    then:
      - lvgl.label.update:
          id: lbl_heap_free
          text: !lambda |-
            char buf[24]; snprintf(buf, sizeof(buf), "%.0f B", id(heap_free_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_heap_block
          text: !lambda |-
            char buf[24]; snprintf(buf, sizeof(buf), "%.0f B", id(heap_block_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_free_psram
          text: !lambda |-
            char buf[24]; snprintf(buf, sizeof(buf), "%.0f B", id(free_psram_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_loop_time
          text: !lambda |-
            char buf[24]; snprintf(buf, sizeof(buf), "%.0f ms", id(loop_time_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_chip_temp
          text: !lambda |-
            char buf[16]; snprintf(buf, sizeof(buf), "%.1f C", id(chip_temp_val).state); return std::string(buf);
      - lvgl.label.update:
          id: lbl_reset_reason
          text: !lambda |-
            return id(reset_reason_val).state;
