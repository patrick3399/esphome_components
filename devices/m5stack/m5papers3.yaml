              # Center: IMU
              - label:
                  text: "IMU"
                  text_font: font_small
                  text_color: 0x000000
              # Right: Sys >
              - obj:
                  width: 80
                  height: 65
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  shadow_opa: TRANSP
                  pad_all: 6
                  scrollable: false
                  scrollbar_mode: "OFF"
                  clickable: true
                  on_click:
                    - script.execute: update_system
                    - lvgl.page.show: system_page
                    - lambda: |-
                        id(current_page) = 2;
                        id(pending_full_refresh) = true;
                  widgets:
                    - label:
                        text: "Sys >"
                        text_font: font_small
                        text_color: 0x000000

    - id: system_page
      bg_color: 0xFFFFFF
      widgets:
        # Border frame
        - obj:
            x: 8
            y: 8
            width: 524
            height: 944
            bg_opa: TRANSP
            border_color: 0x000000
            border_width: 2
            radius: 0
            scrollable: false
            scrollbar_mode: "OFF"

        # Title: System
        - label:
            align: TOP_MID
            y: 25
            text: "System"
            text_font: font_title
            text_color: 0x000000

        # Heap Free
