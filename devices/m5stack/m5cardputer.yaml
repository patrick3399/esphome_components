substitutions:
  devicename: "m5cardputer"
  friendly_name: "M5Stack Cardputer"

esphome:
  name: $devicename
  friendly_name: $friendly_name
  min_version: "2026.1.0"
  on_boot:
    - priority: 600
      then:
        - light.turn_on:
            id: lcd_backlight
            brightness: 80%

packages:
  common: !include ../../packages/common.yaml

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

# Cardputer (ESP32-S3FN8) has NO PSRAM — GPIO33-37 are reserved for the ST7789v
# LCD bus, which is also why enabling psram: produces hardware conflicts.

api:
  reboot_timeout: 4h
  custom_services: true
  encryption:
    key: !secret api_key
  actions:
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - delay: 1ms
        - rtttl.play:
            rtttl: !lambda 'return song_str;'

script:
  - id: cardputer_va_toggle
    mode: restart
    then:
      - if:
          condition:
            or:
              - voice_assistant.is_running:
              - media_player.is_announcing:
          then:
            - voice_assistant.stop:
            - media_player.stop:
                id: cardputer_media_player
          else:
            - voice_assistant.start:
                silence_detection: true

wifi:
  ap:

network:
  enable_high_performance: false

logger:
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200
  level: DEBUG
  logs:
    wifi: WARN
    esp-idf: WARN

spi:
  id: lcd_spi
  clk_pin: GPIO36
  mosi_pin: GPIO35
  miso_pin: GPIO39

# Grove HY2.0-4P exposes GPIO1/GPIO2 as I2C, but nothing is attached yet.
# i2c:
#   - id: grove_i2c
#     sda: GPIO1
#     scl: GPIO2
#     scan: true

i2s_audio:
  id: cardputer_i2s_bus
  i2s_bclk_pin: GPIO41
  i2s_lrclk_pin: GPIO43

microphone:
  - platform: i2s_audio
    id: cardputer_mic
    i2s_audio_id: cardputer_i2s_bus
    adc_type: external
    i2s_din_pin: GPIO46
    pdm: true
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: cardputer_speaker
    i2s_audio_id: cardputer_i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO42
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right
    output_gain: 3.0
    # buffer_duration × sample_rate × channels × bytes_per_sample = ring buffer bytes.
    # 100 ms × 16000 × 1 × 2 = 3200 B (vs 96 KB at 48 kHz stereo / 500 ms). Heap budget on this
    # PSRAM-less SoC is brutally tight, so we trade audio fidelity for headroom.
    buffer_duration: 100ms
    timeout: 500ms

rtttl:
  id: cardputer_rtttl
  speaker: cardputer_speaker
  gain: 1.0

media_player:
  - platform: speaker
    id: cardputer_media_player
    name: "Speaker Media Player"
    buffer_size: 6000
    volume_max: 1.0
    announcement_pipeline:
      speaker: cardputer_speaker
      format: WAV
      num_channels: 1
      sample_rate: 16000

voice_assistant:
  id: va
  microphone: cardputer_mic
  media_player: cardputer_media_player
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0dBFS
  volume_multiplier: 1.0
  on_listening:
    - logger.log:
        level: DEBUG
        format: "Voice Assistant listening"
  on_stt_end:
    - logger.log:
        level: DEBUG
        format: "Voice Assistant heard: %s"
        args: ["x.c_str()"]
  on_tts_start:
    - logger.log:
        level: DEBUG
        format: "Voice Assistant response: %s"
        args: ["x.c_str()"]
  on_end:
    - wait_until:
        condition:
          media_player.is_announcing:
        timeout: 0.5s
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
  on_error:
    - logger.log:
        level: WARN
        format: "Voice Assistant error: %s - %s"
        args: ["code.c_str()", "message.c_str()"]

remote_transmitter:
  id: ir_tx
  pin: GPIO44
  carrier_duty_percent: 50%
  non_blocking: true

infrared:
  - platform: ir_rf_proxy
    name: "Infrared Transmitter"
    remote_transmitter_id: ir_tx

output:
  - platform: ledc
    id: lcd_backlight_output
    pin: GPIO38
    frequency: 200Hz

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    icon: "mdi:television"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

binary_sensor:
  - platform: gpio
    id: user_button
    name: "User Button"
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true

text_sensor:
  - platform: template
    id: keyboard_input_text
    name: "Keyboard Input"
    update_interval: never

74hc138_keypad:
  id: keyboard
  address_pins:
    - pin: GPIO8
    - pin: GPIO9
    - pin: GPIO11
  input_pins:
    - pin:
        number: GPIO13
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO15
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO3
        inverted: true
        ignore_strapping_warning: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO4
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO5
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO6
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO7
        inverted: true
        mode:
          input: true
          pullup: true
  debounce_time: 5ms
  on_key:
    - lambda: |-
        std::string text = id(keyboard_input_text).state;
        if (x == '\n') {
          id(cardputer_va_toggle).execute();
          return;
        } else if (x == 0x08) {
          if (!text.empty()) {
            text.pop_back();
          }
        } else if (x >= 0x20 && x <= 0x7e) {
          if (text.length() < 64) {
            text.push_back(static_cast<char>(x));
          }
        } else {
          return;
        }
        id(keyboard_input_text).publish_state(text);
        const uint32_t display_start = millis();
        id(lcd).update();
        id(display_update_time).publish_state(millis() - display_start);

sensor:
  - platform: internal_temperature
    id: chip_temperature
    name: "Chip Temperature"

  - platform: template
    id: display_update_time
    name: "Display Update Time"
    unit_of_measurement: "ms"
    accuracy_decimals: 0
    update_interval: never

  - platform: adc
    id: battery_voltage
    name: "Battery Voltage"
    pin: GPIO10
    attenuation: 12db
    update_interval: 30s
    filters:
      # M5 official demo reads calibrated millivolts and doubles the value.
      - multiply: 2.0

  - platform: template
    id: battery_level
    name: "Battery Level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      const float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      if (v >= 4.12f) return 100.0f;
      if (v >= 3.88f) return 75.0f;
      if (v >= 3.61f) return 50.0f;
      if (v >= 3.40f) return 25.0f;
      return 0.0f;

  # Cardputer mic and speaker share the same I2S parent bus. sound_level with
  # passive: false starts the microphone at boot and keeps the bus busy, which
  # prevents Speaker Media Player from starting ("Parent I2S bus not free").
  # Keep the microphone defined above for VA tests, but do not run continuous
  # sound_level until we have explicit I2S bus arbitration or a duplex path.
  # - platform: sound_level
  #   id: mic_sound_level
  #   microphone: cardputer_mic
  #   measurement_duration: 1000ms
  #   passive: false
  #   peak:
  #     id: mic_peak_level
  #     name: "Mic Peak Sound Level"
  #   rms:
  #     id: mic_rms_level
  #     name: "Mic RMS Sound Level"

display:
  - platform: st7789v
    id: lcd
    model: CUSTOM
    height: 240
    width: 135
    offset_height: 40
    offset_width: 52
    cs_pin: GPIO37
    dc_pin: GPIO34
    reset_pin: GPIO33
    backlight_pin: false
    rotation: 90
    data_rate: 40MHz
    update_interval: 20s
    lambda: |-
      it.fill(Color::BLACK);
      const bool wifi_connected = wifi::global_wifi_component != nullptr && wifi::global_wifi_component->is_connected();
      const bool api_connected = api::global_api_server != nullptr && api::global_api_server->is_connected();
      it.printf(8, 5, id(font_small), Color(0x60, 0xC0, 0xFF), "W:%s A:%s", wifi_connected ? "on" : "off", api_connected ? "on" : "off");
      it.printf(154, 5, id(font_small), Color::WHITE, "%.2fV %.0f%%", id(battery_voltage).state, id(battery_level).state);

      it.printf(8, 31, id(font_small), Color(0xFF, 0xFF, 0x60), "INPUT");
      std::string input = id(keyboard_input_text).state;
      if (input.length() > 24) {
        input = input.substr(input.length() - 24);
      }
      for (auto &ch : input) {
        if (ch == ' ') ch = '_';
      }
      if (input.empty()) {
        it.printf(8, 57, id(font_key), Color(0x60, 0x60, 0x60), "--");
      } else {
        it.printf(8, 60, id(font_small), Color(0xFF, 0xFF, 0x60), "%s", input.c_str());
      }

      it.printf(8, 88, id(font_small), Color(0x7E, 0xE7, 0x87), "I2S speaker");
      it.printf(8, 112, id(font_small), Color(0xD6, 0xE2, 0xEE), "RTTTL + Media");

font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 14
  - file: "gfonts://Roboto Mono"
    id: font_key
    size: 38

button:
  - platform: template
    name: "Voice Assistant"
    icon: "mdi:account-voice"
    on_press:
      - script.execute: cardputer_va_toggle

# Keyboard hardware notes:
# - 74HC138 address pins: GPIO8, GPIO9, GPIO11
# - Active-low input pins: GPIO13, GPIO15, GPIO3, GPIO4, GPIO5, GPIO6, GPIO7
# - ESPHome matrix_keypad cannot model this decoder topology; use the local
#   74hc138_keypad external component above.
