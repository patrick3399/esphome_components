substitutions:
  devicename: "m5cardputer"
  friendly_name: "M5Stack Cardputer"
  # Adjust to match your Home Assistant setup.
  # cardputer_assist_satellite_entity: HA-side assist_satellite entity for this device.
  #   Find it under Settings → Voice assistants, or Dev Tools → States (filter:
  #   "assist_satellite"). ESPHome auto-registers it from the voice_assistant block.
  # cardputer_conversation_agent: the conversation entity used for typed queries
  #   (e.g. conversation.home_assistant for the default agent, or your Ollama / LLM agent).
  cardputer_assist_satellite_entity: "assist_satellite.m5stack_cardputer_assist_satellite"
  cardputer_conversation_agent: "conversation.ollama_conversation"

esphome:
  name: $devicename
  friendly_name: $friendly_name
  min_version: "2026.4.0"
  on_boot:
    - priority: 600
      then:
        - light.turn_on:
            id: lcd_backlight
            brightness: 80%

packages:
  ha: !include ../../packages/common-ha.yaml
  wifi: !include ../../packages/common-wifi.yaml

external_components:
  - source: github://patrick3399/esphome_components
    components: [74hc138_keypad, i2s_audio]
    refresh: 0s

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

# Cardputer (ESP32-S3FN8) has NO PSRAM — GPIO33-37 are reserved for the ST7789v
# LCD bus, which is also why enabling psram: produces hardware conflicts.

api:
  reboot_timeout: 4h
  custom_services: true
  # Required for homeassistant.action (device -> HA service calls). Without this,
  # HA never sends SubscribeHomeassistantServicesRequest and the device-side
  # send_homeassistant_action() drops the call silently.
  homeassistant_services: true
  encryption:
    key: !secret api_key
  actions:
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - delay: 1ms
        - rtttl.play:
            rtttl: !lambda 'return song_str;'

script:
  - id: cardputer_va_toggle
    mode: restart
    then:
      - if:
          condition:
            or:
              - voice_assistant.is_running:
              - media_player.is_announcing:
          then:
            - voice_assistant.stop:
            - media_player.stop:
                id: cardputer_media_player
          else:
            - voice_assistant.start:
                silence_detection: true

  # Text-only path: bypass STT by sending typed text straight to HA's
  # conversation pipeline, then TTS-speaking the reply via assist_satellite.
  # The satellite's on_end VA handler resets state to IDLE when announce finishes.
  - id: cardputer_send_text_query
    mode: restart
    parameters:
      query: string
    then:
      - lambda: |-
          ESP_LOGI("typed", "submit q=%s heap_free=%u max_block=%u",
                   query.c_str(),
                   (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                   (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL));
          id(va_heard_text).publish_state(query);
          id(va_response_text).publish_state(std::string(""));
          id(va_state_text).publish_state("THINK");
      - component.update: lcd
      - logger.log:
          level: INFO
          tag: "typed"
          format: "calling conversation.process via HA"
      - homeassistant.action:
          action: conversation.process
          data:
            text: !lambda 'return query;'
            agent_id: ${cardputer_conversation_agent}
          capture_response: true
          response_template: "{{ response.response.speech.plain.speech }}"
          on_success:
            - lambda: |-
                std::string reply = response["response"].as<std::string>();
                ESP_LOGI("typed", "on_success reply=%s", reply.c_str());
                if (reply.empty()) reply = std::string("(no reply)");
                id(pending_tts_reply) = reply;
                id(va_response_text).publish_state(reply.substr(0, 64));
                id(va_state_text).publish_state("SPEAK");
            - component.update: lcd
            # assist_satellite.announce routes TTS through the pipeline tied to
            # this satellite — no need to hardcode the TTS engine. When the
            # announcement finishes the VA on_end handler resets state to IDLE.
            - homeassistant.action:
                action: assist_satellite.announce
                data:
                  entity_id: ${cardputer_assist_satellite_entity}
                  message: !lambda 'return id(pending_tts_reply);'
                data_template:
                  preannounce: "{{ false }}"
          on_error:
            - lambda: |-
                ESP_LOGE("typed", "on_error: %s", error.c_str());
                std::string err = std::string("Error: ") + error;
                id(va_response_text).publish_state(err.substr(0, 64));
                id(va_state_text).publish_state("ERROR");
            - component.update: lcd

wifi:
  ap:

network:
  enable_high_performance: false

logger:
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200
  level: DEBUG
  logs:
    wifi: WARN
    esp-idf: WARN

debug:

globals:
  - id: ui_page
    type: int
    restore_value: false
    initial_value: "0"
  - id: input_cursor
    type: int
    restore_value: false
    initial_value: "0"
  - id: caps_lock
    type: bool
    restore_value: false
    initial_value: "false"
  - id: pending_tts_reply
    type: std::string
    restore_value: false

spi:
  id: lcd_spi
  clk_pin: GPIO36
  mosi_pin: GPIO35
  miso_pin: GPIO39

# Grove HY2.0-4P exposes GPIO1/GPIO2 as I2C, but nothing is attached yet.
# i2c:
#   - id: grove_i2c
#     sda: GPIO1
#     scl: GPIO2
#     scan: true

i2s_audio:
  id: cardputer_i2s_bus
  i2s_bclk_pin: GPIO41
  i2s_lrclk_pin: GPIO43

microphone:
  - platform: i2s_audio
    id: cardputer_mic
    i2s_audio_id: cardputer_i2s_bus
    adc_type: external
    i2s_din_pin: GPIO46
    pdm: true
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: cardputer_speaker
    i2s_audio_id: cardputer_i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO42
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right
    output_gain: 3.0
    # buffer_duration × sample_rate × channels × bytes_per_sample = ring buffer bytes.
    # 100 ms × 16000 × 1 × 2 = 3200 B (vs 96 KB at 48 kHz stereo / 500 ms). Heap budget on this
    # PSRAM-less SoC is brutally tight, so we trade audio fidelity for headroom.
    buffer_duration: 100ms
    timeout: 500ms

rtttl:
  id: cardputer_rtttl
  speaker: cardputer_speaker
  gain: 1.0

media_player:
  - platform: speaker
    id: cardputer_media_player
    name: "Speaker Media Player"
    buffer_size: 6000
    volume_max: 1.0
    announcement_pipeline:
      speaker: cardputer_speaker
      format: WAV
      num_channels: 1
      sample_rate: 16000

voice_assistant:
  id: va
  microphone: cardputer_mic
  media_player: cardputer_media_player
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0dBFS
  volume_multiplier: 1.0
  on_listening:
    - text_sensor.template.publish:
        id: va_state_text
        state: "LISTEN"
    - component.update: lcd
    - logger.log:
        level: DEBUG
        format: "Voice Assistant listening"
  on_stt_end:
    - text_sensor.template.publish:
        id: va_state_text
        state: "THINK"
    - text_sensor.template.publish:
        id: va_heard_text
        state: !lambda |-
          return x.substr(0, 64);
    - component.update: lcd
    - logger.log:
        level: DEBUG
        format: "Voice Assistant heard: %s"
        args: ["x.c_str()"]
  on_tts_start:
    - text_sensor.template.publish:
        id: va_state_text
        state: "SPEAK"
    - text_sensor.template.publish:
        id: va_response_text
        state: !lambda |-
          return x.substr(0, 64);
    - component.update: lcd
    - logger.log:
        level: DEBUG
        format: "Voice Assistant response: %s"
        args: ["x.c_str()"]
  on_end:
    - wait_until:
        condition:
          media_player.is_announcing:
        timeout: 0.5s
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
    - text_sensor.template.publish:
        id: va_state_text
        state: "IDLE"
    - component.update: lcd
  on_error:
    - text_sensor.template.publish:
        id: va_state_text
        state: "ERROR"
    - text_sensor.template.publish:
        id: va_response_text
        state: !lambda |-
          return message.substr(0, 64);
    - component.update: lcd
    - logger.log:
        level: WARN
        format: "Voice Assistant error: %s - %s"
        args: ["code.c_str()", "message.c_str()"]

remote_transmitter:
  id: ir_tx
  pin: GPIO44
  carrier_duty_percent: 50%
  non_blocking: true

infrared:
  - platform: ir_rf_proxy
    name: "Infrared Transmitter"
    remote_transmitter_id: ir_tx

output:
  - platform: ledc
    id: lcd_backlight_output
    pin: GPIO38
    frequency: 200Hz

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    icon: "mdi:television"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

binary_sensor:
  - platform: gpio
    id: user_button
    name: "User Button"
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true
    on_press:
      - script.execute: cardputer_va_toggle

text_sensor:
  - platform: template
    id: keyboard_input_text
    name: "Keyboard Input"
    update_interval: never

  - platform: template
    id: keyboard_submitted_text
    name: "Keyboard Submitted Text"
    update_interval: never

  - platform: template
    id: va_state_text
    name: "Voice Assistant State"
    update_interval: never
    lambda: |-
      return std::string("IDLE");

  - platform: template
    id: va_heard_text
    name: "Voice Assistant Heard"
    update_interval: never

  - platform: template
    id: va_response_text
    name: "Voice Assistant Response"
    update_interval: never

74hc138_keypad:
  id: keyboard
  address_pins:
    - pin: GPIO8
    - pin: GPIO9
    - pin: GPIO11
  input_pins:
    - pin:
        number: GPIO13
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO15
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO3
        inverted: true
        ignore_strapping_warning: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO4
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO5
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO6
        inverted: true
        mode:
          input: true
          pullup: true
    - pin:
        number: GPIO7
        inverted: true
        mode:
          input: true
          pullup: true
  debounce_time: 5ms
  on_key:
    - lambda: |-
        const uint8_t KEY_LEFT_SHIFT = 0x81;
        const uint8_t KEY_FN = 0x82;
        const uint8_t KEY_CTRL = 0x83;
        const uint8_t KEY_OPT = 0x84;
        const uint8_t KEY_ALT = 0x85;
        const uint8_t KEY_LEFT = 0x90;
        const uint8_t KEY_DOWN = 0x91;
        const uint8_t KEY_RIGHT = 0x92;
        const uint8_t KEY_UP = 0x93;
        std::string text = id(keyboard_input_text).state;
        if (id(input_cursor) < 0 || id(input_cursor) > static_cast<int>(text.length())) {
          id(input_cursor) = text.length();
        }

        if (x == '\n') {
          if (text.empty()) {
            id(cardputer_va_toggle).execute();
          } else {
            id(keyboard_submitted_text).publish_state(text);
            id(keyboard_input_text).publish_state(std::string(""));
            id(input_cursor) = 0;
            id(cardputer_send_text_query)->execute(text);
          }
        } else if (x == '\t') {
          id(ui_page) = (id(ui_page) + 1) % 2;
        } else if (x == KEY_LEFT_SHIFT) {
          id(caps_lock) = !id(caps_lock);
        } else if (x == KEY_FN || x == KEY_CTRL || x == KEY_OPT || x == KEY_ALT) {
          return;
        } else if (x == KEY_LEFT) {
          if (id(input_cursor) > 0) {
            id(input_cursor)--;
          }
        } else if (x == KEY_RIGHT) {
          if (id(input_cursor) < static_cast<int>(text.length())) {
            id(input_cursor)++;
          }
        } else if (x == KEY_UP || x == KEY_DOWN) {
          id(ui_page) = x == KEY_UP ? 0 : 1;
        } else if (x == 0x08) {
          if (id(input_cursor) > 0 && !text.empty()) {
            text.erase(id(input_cursor) - 1, 1);
            id(input_cursor)--;
            id(keyboard_input_text).publish_state(text);
          }
        } else if (x >= 0x20 && x <= 0x7e) {
          char ch = static_cast<char>(x);
          if (id(caps_lock) && ch >= 'a' && ch <= 'z') {
            ch = ch - 'a' + 'A';
          }
          if (text.length() < 64) {
            text.insert(text.begin() + id(input_cursor), ch);
            id(input_cursor)++;
            id(keyboard_input_text).publish_state(text);
          }
        } else {
          return;
        }
        const uint32_t display_start = millis();
        id(lcd).update();
        id(display_update_time).publish_state(millis() - display_start);

sensor:
  - platform: internal_temperature
    id: chip_temperature
    name: "Chip Temperature"

  - platform: debug
    free:
      id: heap_free
      name: "Heap Free"
    block:
      id: heap_max_block
      name: "Heap Max Block"
    loop_time:
      id: loop_time
      name: "Loop Time"

  - platform: template
    id: display_update_time
    name: "Display Update Time"
    unit_of_measurement: "ms"
    accuracy_decimals: 0
    update_interval: never

  - platform: adc
    id: battery_voltage
    name: "Battery Voltage"
    pin: GPIO10
    attenuation: 12db
    update_interval: 30s
    filters:
      # M5 official demo reads calibrated millivolts and doubles the value.
      - multiply: 2.0

  - platform: template
    id: battery_level
    name: "Battery Level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      const float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      if (v >= 4.12f) return 100.0f;
      if (v >= 3.88f) return 75.0f;
      if (v >= 3.61f) return 50.0f;
      if (v >= 3.40f) return 25.0f;
      return 0.0f;

  # Cardputer mic and speaker share the same I2S parent bus. sound_level with
  # passive: false starts the microphone at boot and keeps the bus busy, which
  # prevents Speaker Media Player from starting ("Parent I2S bus not free").
  # Keep the microphone defined above for VA tests, but do not run continuous
  # sound_level until we have explicit I2S bus arbitration or a duplex path.
  # - platform: sound_level
  #   id: mic_sound_level
  #   microphone: cardputer_mic
  #   measurement_duration: 1000ms
  #   passive: false
  #   peak:
  #     id: mic_peak_level
  #     name: "Mic Peak Sound Level"
  #   rms:
  #     id: mic_rms_level
  #     name: "Mic RMS Sound Level"

display:
  - platform: st7789v
    id: lcd
    model: CUSTOM
    height: 240
    width: 135
    offset_height: 40
    offset_width: 52
    cs_pin: GPIO37
    dc_pin: GPIO34
    reset_pin: GPIO33
    backlight_pin: false
    rotation: 90
    data_rate: 40MHz
    update_interval: 20s
    lambda: |-
      it.fill(Color::BLACK);
      const bool wifi_connected = wifi::global_wifi_component != nullptr && wifi::global_wifi_component->is_connected();
      const bool api_connected = api::global_api_server != nullptr && api::global_api_server->is_connected();
      const char *page_name = id(ui_page) == 0 ? "INPUT" : "DEBUG";
      std::string va_state = id(va_state_text).state;
      if (va_state.empty()) va_state = "IDLE";
      Color va_color = Color(0xA8, 0xB3, 0xCF);
      if (va_state == "LISTEN") va_color = Color(0x60, 0xC0, 0xFF);
      if (va_state == "THINK") va_color = Color(0xFF, 0xD1, 0x66);
      if (va_state == "SPEAK") va_color = Color(0x7E, 0xE7, 0x87);
      if (va_state == "ERROR") va_color = Color(0xFF, 0x7B, 0x72);

      it.filled_rectangle(0, 0, 240, 19, Color(0x0F, 0x14, 0x1F));
      it.printf(6, 3, id(font_small), wifi_connected ? Color(0x7E, 0xE7, 0x87) : Color(0xFF, 0x7B, 0x72),
                "W%s", wifi_connected ? "+" : "-");
      it.printf(34, 3, id(font_small), api_connected ? Color(0x7E, 0xE7, 0x87) : Color(0xFF, 0x7B, 0x72),
                "A%s", api_connected ? "+" : "-");
      it.printf(68, 3, id(font_small), va_color, "%s", va_state.c_str());
      it.printf(158, 3, id(font_small), Color::WHITE, "%.2fV %.0f%%", id(battery_voltage).state, id(battery_level).state);
      it.line(0, 20, 239, 20, Color(0x2A, 0x34, 0x45));

      if (id(ui_page) == 0) {
        it.printf(8, 27, id(font_small), Color(0xFF, 0xFF, 0x60), "%s", page_name);
        it.printf(68, 27, id(font_small), Color(0xA8, 0xB3, 0xCF), "Btn:VA Tab:Dbg");
        it.rectangle(7, 47, 226, 29, Color(0x3D, 0x4A, 0x60));
        std::string input = id(keyboard_input_text).state;
        if (id(input_cursor) < 0 || id(input_cursor) > static_cast<int>(input.length())) {
          id(input_cursor) = input.length();
        }
        int start = 0;
        if (id(input_cursor) > 24) start = id(input_cursor) - 24;
        if (static_cast<int>(input.length()) - start > 28) {
          input = input.substr(start, 28);
        } else {
          input = input.substr(start);
        }
        if (input.empty()) {
          it.printf(13, 55, id(font_small), Color(0x60, 0x60, 0x60), "type here");
        } else {
          it.printf(13, 55, id(font_small), Color(0xF2, 0xF6, 0xFF), "%s", input.c_str());
        }
        const int cursor_x = 13 + (id(input_cursor) - start) * 8;
        if (cursor_x >= 13 && cursor_x <= 230) {
          it.line(cursor_x, 53, cursor_x, 69, Color(0xFF, 0xFF, 0x60));
        }
        std::string heard = id(va_heard_text).state;
        std::string response = id(va_response_text).state;
        if (heard.length() > 25) heard = heard.substr(0, 25);
        if (response.length() > 25) response = response.substr(0, 25);
        it.printf(8, 84, id(font_small), Color(0x60, 0xC0, 0xFF), "Heard");
        it.printf(62, 84, id(font_small), Color(0xD6, 0xE2, 0xEE), "%s", heard.empty() ? "--" : heard.c_str());
        it.printf(8, 104, id(font_small), Color(0x7E, 0xE7, 0x87), "Reply");
        it.printf(62, 104, id(font_small), Color(0xD6, 0xE2, 0xEE), "%s", response.empty() ? "--" : response.c_str());
      } else {
        it.printf(8, 27, id(font_small), Color(0xFF, 0xFF, 0x60), "%s", page_name);
        it.printf(68, 27, id(font_small), Color(0xA8, 0xB3, 0xCF), "Btn:VA Tab:In");
        uint32_t up = static_cast<uint32_t>(id(uptime_sensor).state);
        uint32_t hours = up / 3600;
        uint32_t minutes = (up / 60) % 60;
        it.printf(8, 48, id(font_small), Color(0xD6, 0xE2, 0xEE), "Heap %.0fB", id(heap_free).state);
        it.printf(8, 66, id(font_small), Color(0xD6, 0xE2, 0xEE), "Blk %.0fB", id(heap_max_block).state);
        it.printf(8, 84, id(font_small), Color(0xD6, 0xE2, 0xEE), "Loop %.0fms", id(loop_time).state);
        it.printf(8, 102, id(font_small), Color(0xD6, 0xE2, 0xEE), "LCD %.0fms", id(display_update_time).state);
        it.printf(144, 48, id(font_small), Color(0xD6, 0xE2, 0xEE), "RSSI %.0f", id(wifi_signal_sensor).state);
        it.printf(144, 66, id(font_small), Color(0xD6, 0xE2, 0xEE), "Up %02u:%02u", hours, minutes);
        it.printf(144, 84, id(font_small), Color(0xD6, 0xE2, 0xEE), "CPU %.1fC", id(chip_temperature).state);
      }

font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 14
  - file: "gfonts://Roboto Mono"
    id: font_key
    size: 38

button:
  - platform: template
    name: "Voice Assistant"
    icon: "mdi:account-voice"
    on_press:
      - script.execute: cardputer_va_toggle

# Keyboard hardware notes:
# - 74HC138 address pins: GPIO8, GPIO9, GPIO11
# - Active-low input pins: GPIO13, GPIO15, GPIO3, GPIO4, GPIO5, GPIO6, GPIO7
# - ESPHome matrix_keypad cannot model this decoder topology; use the local
#   74hc138_keypad external component above.
