esphome:
  name: wled-bridge-ent-poc
  friendly_name: WLED Bridge Entities PoC

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source: github://patrick3399/esphome_components
    components: [wled_bridge]

light:
  - platform: esp32_rmt_led_strip
    id: my_leds
    name: "LED Strip"
    pin: GPIO38
    num_leds: 144
    chipset: WS2812
    rgb_order: GRB
    use_dma: true
    use_psram: true
    gamma_correct: 0.0
    color_correct: [1.0, 1.0, 1.0]

wled_bridge:
  light_id: my_leds
  max_ma: 5000
  led_ma: 55
  palette_select:
    name: "WLED Palette"
  effect_select:
    name: "WLED Effect"
  speed_number:
    name: "WLED Speed"
  intensity_number:
    name: "WLED Intensity"
  preset_select:
    name: "WLED Preset"
  nightlight_switch:
    name: "WLED Nightlight"
  sync_send_switch:
    name: "WLED Sync Send"
  sync_receive_switch:
    name: "WLED Sync Receive"
  estimated_current:
    name: "WLED Estimated Current"
