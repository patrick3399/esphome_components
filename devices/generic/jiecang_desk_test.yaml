esphome:
  name: jiecang-test

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

external_components:
  - source: ../../components
    components: [jiecang_desk_controller]

uart:
  - id: desk_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 9600

jiecang_desk_controller:
  uart_id: desk_uart

sensor:
  - platform: jiecang_desk_controller
    height:
      name: "Desk Height"
    height_min:
      name: "Desk Height Min"
    height_max:
      name: "Desk Height Max"
    height_pct:
      name: "Desk Height Percent"
    m1:
      name: "Desk M1"
    m2:
      name: "Desk M2"
    m3:
      name: "Desk M3"
    m4:
      name: "Desk M4"

button:
  - platform: jiecang_desk_controller
    step_up:
      name: "Desk Step Up"
    step_down:
      name: "Desk Step Down"
    stop:
      name: "Desk Stop"
    move_up:
      name: "Desk Move Up"
    move_down:
      name: "Desk Move Down"
    goto_m1:
      name: "Desk Go to M1"
    goto_m2:
      name: "Desk Go to M2"
    goto_m3:
      name: "Desk Go to M3"
    goto_m4:
      name: "Desk Go to M4"
    save_m1:
      name: "Desk Save M1"
    save_m2:
      name: "Desk Save M2"
    save_m3:
      name: "Desk Save M3"
    save_m4:
      name: "Desk Save M4"

number:
  - platform: jiecang_desk_controller
    height:
      name: "Desk Height Control"
      unit_of_measurement: "cm"
    height_pct:
      name: "Desk Height Percent Control"
      unit_of_measurement: "%"
