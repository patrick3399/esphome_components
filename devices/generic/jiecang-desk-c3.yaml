substitutions:
  name: jiecang-desk
  friendly_name: "Jiecang Desk Controller"
  tx_pin: GPIO5   # RJ12 Yellow wire
  rx_pin: GPIO6   # RJ12 Red wire

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Status LED — C3 Super Mini built-in blue LED (GPIO8, active-low, strapping pin)
light:
  - platform: status_led
    id: led_status
    name: "Status LED"
    pin:
      number: GPIO8
      inverted: true
      ignore_strapping_warning: true
    internal: true
    restore_mode: ALWAYS_OFF

external_components:
  - source: github://patrick3399/esphome_components
    components: [jiecang_desk_controller]

uart:
  - id: desk_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600

jiecang_desk_controller:
  uart_id: desk_uart

sensor:
  - platform: jiecang_desk_controller
    height:
      name: "Desk Height"
    height_min:
      name: "Desk Height Min"
      entity_category: diagnostic
    height_max:
      name: "Desk Height Max"
      entity_category: diagnostic
    height_pct:
      name: "Desk Height %"
    m1:
      name: "Desk Preset M1"
      entity_category: diagnostic
    m2:
      name: "Desk Preset M2"
      entity_category: diagnostic
    m3:
      name: "Desk Preset M3"
      entity_category: diagnostic
    m4:
      name: "Desk Preset M4"
      entity_category: diagnostic

number:
  - platform: jiecang_desk_controller
    height:
      name: "Desk Height"
      unit_of_measurement: "cm"
    height_pct:
      name: "Desk Height %"
      unit_of_measurement: "%"

button:
  - platform: jiecang_desk_controller
    step_up:
      name: "Step Up"
    step_down:
      name: "Step Down"
    stop:
      name: "Stop"
    move_up:
      name: "Move Up"
    move_down:
      name: "Move Down"
    goto_m1:
      name: "Go to M1"
    goto_m2:
      name: "Go to M2"
    goto_m3:
      name: "Go to M3"
    goto_m4:
      name: "Go to M4"
    save_m1:
      name: "Save M1"
      entity_category: config
    save_m2:
      name: "Save M2"
      entity_category: config
    save_m3:
      name: "Save M3"
      entity_category: config
    save_m4:
      name: "Save M4"
      entity_category: config
