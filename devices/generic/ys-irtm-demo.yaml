substitutions:
  name: ys-irtm-uart-bridge
  friendly_name: YS-IRTM UART Bridge

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  baud_rate: 0  # disable logger UART to avoid conflict with UART2 (GPIO16/17)

api:
  encryption:
    key: !secret api_key
  services:
    # Direct low-level NEC TX — useful for debugging without the infrared entity.
    - service: send_nec
      variables:
        user_code_hi: int
        user_code_lo: int
        key_code: int
        repeats: int
      then:
        - ys_irtm_uart.send_nec:
            id: ys_irtm
            user_code_hi: !lambda 'return static_cast<uint8_t>(user_code_hi);'
            user_code_lo: !lambda 'return static_cast<uint8_t>(user_code_lo);'
            key_code:     !lambda 'return static_cast<uint8_t>(key_code);'
            repeats:      !lambda 'return static_cast<uint8_t>(repeats);'

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

captive_portal:

external_components:
  - source: github://patrick3399/esphome_components
    components: [ys_irtm_uart]

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1

ys_irtm_uart:
  id: ys_irtm
  uart_id: uart_bus
  on_ir_receive:
    then:
      - logger.log:
          format: "UART IR RX: UserCode=0x%02X%02X  KeyCode=0x%02X"
          args: ["user_code_hi", "user_code_lo", "key_code"]

# GPIO IR receiver for HA infrared integration (RX path).
# Pin GPIO34 is input-only on ESP32 — suitable for IR receiver module.
# Most modules (TSOP38238, etc.) output active-low; inverted: true corrects this.
remote_receiver:
  id: ir_rx
  pin:
    number: GPIO34
    inverted: true
  tolerance: 25%

# HA infrared integration:
#   TX — ys_irtm_uart platform: NEC commands sent via UART to YS-IRTM module.
#   RX — ir_rf_proxy platform:  raw timings captured via GPIO remote_receiver.
infrared:
  - platform: ys_irtm_uart
    name: "IR Transmitter"
    ys_irtm_uart_id: ys_irtm

  - platform: ir_rf_proxy
    name: "IR Receiver"
    remote_receiver_id: ir_rx

button:
  - platform: template
    name: "YS-IRTM Send NEC Example"
    on_press:
      - ys_irtm_uart.send_nec:
          id: ys_irtm
          user_code_hi: 0x07
          user_code_lo: 0x07
          key_code: 0x02
          repeats: 0
