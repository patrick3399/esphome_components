esphome:
  name: test-mcu90640-s3-psram

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

logger:
  baud_rate: 0

external_components:
  - source: ../components
    components: [mcu90640]

uart:
  id: thermal_uart
  rx_pin: GPIO6
  tx_pin: GPIO5
  baud_rate: 115200
  rx_buffer_size: 2048

mcu90640:
  id: thermal_camera
  name: "Thermal Camera"
  uart_id: thermal_uart
  performance_profile: high_quality
