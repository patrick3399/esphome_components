# Test: ESP32-S3 + ESP-IDF framework
# Tests active local components including ed047tc1 (E-ink display) on ESP32-S3
# Mirrors ESPHome's build_components_base.esp32-s3-idf.yaml approach
#
# Note: ed047tc1 requires the EPDIY library and PSRAM (same as m5stack-papers3)

esphome:
  name: test-esp32s3-idf
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
  libraries:
    - EPDIY=https://github.com/patrick3399/epdiy.git#fix/platformio-srcfilter

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 0

# Use local source to test components in this repository
external_components:
  - source: ../components

i2c:
  sda: GPIO41
  scl: GPIO42
  scan: false

# AW9523: GPIO I/O Expander (I2C)
aw9523:
  id: aw9523_hub
  address: 0x59

# PCA9505: GPIO I/O Expander (I2C)
pca9505:
  id: pca9505_hub
  address: 0x20

sensor:
  # BMI270: IMU Accelerometer/Gyroscope (I2C)
  - platform: bmi270
    address: 0x68
    acceleration_x:
      name: "Accel X"
    acceleration_y:
      name: "Accel Y"
    acceleration_z:
      name: "Accel Z"
    gyroscope_x:
      name: "Gyro X"
    gyroscope_y:
      name: "Gyro Y"
    gyroscope_z:
      name: "Gyro Z"
    update_interval: 60s

# ED047TC1: 4.7" E-ink Display (parallel GPIO)
# Pin mapping reused from m5stack-papers3.yaml for reference
display:
  - platform: ed047tc1
    id: ed047tc1_display
    pwr_pin: GPIO45
    bst_en_pin: GPIO46
    xstl_pin: GPIO13
    xle_pin: GPIO15
    spv_pin: GPIO17
    ckv_pin: GPIO18
    pclk_pin: GPIO16
    d0_pin: GPIO6
    d1_pin: GPIO14
    d2_pin: GPIO7
    d3_pin: GPIO12
    d4_pin: GPIO9
    d5_pin: GPIO11
    d6_pin: GPIO8
    d7_pin: GPIO10
    update_interval: never
